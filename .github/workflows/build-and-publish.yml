name: Build Dependencies and Publish NuGet Packages

on:
  push:
    branches:
      - main
    paths:
      - "vcpkg.json"
      - "ports/**"
      - ".github/workflows/build-and-publish.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  VCPKG_TARGET_TRIPLET: "x64-linux-dynamic"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang++ \
            lld \
            ninja-build \
            git \
            curl \
            pkg-config \
            jq \
            make

      - name: Show clang version
        run: clang --version && clang++ --version

      - name: Setup vcpkg
        run: make setup

      - name: Validate
        run: make validate

      - name: Build dependencies
        run: make build
        env:
          CC: clang
          CXX: clang++

      - name: Build and publish to NuGet (optional)
        if: |
          secrets.NUGET_FEED_URL != '' &&
          secrets.NUGET_API_KEY != ''
        run: |
          echo "NuGet feed configured. Publishing binaries..."
          export VCPKG_BINARY_SOURCES="clear;nuget,${NUGET_FEED_URL},readwrite"
          export VCPKG_NUGET_API_TOKEN="${NUGET_API_KEY}"
          ./vcpkg/vcpkg install \
            --triplet=${{ env.VCPKG_TARGET_TRIPLET }} \
            --overlay-ports=./ports
          echo "✓ Binaries published to NuGet"
        env:
          CC: clang
          CXX: clang++
          NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Report build status
        if: success()
        run: |
          echo "## Build Status: ✓ Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triplet**: ${{ env.VCPKG_TARGET_TRIPLET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler**: clang (Ubuntu)" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.NUGET_FEED_URL }}" ]; then
            echo "**NuGet**: ✓ Configured and published" >> $GITHUB_STEP_SUMMARY
          else
            echo "**NuGet**: Not configured (optional)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-installed-${{ env.VCPKG_TARGET_TRIPLET }}
          path: vcpkg_installed/
          retention-days: 30
