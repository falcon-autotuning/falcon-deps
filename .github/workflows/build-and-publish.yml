name: Build Dependencies and Publish NuGet Packages

on:
  push:
    branches: [main]
    paths:
      - "vcpkg.json"
      - "ports/**"
      # Make sure this matches your actual workflow filename:
      - ".github/workflows/build_and_publish.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VCPKG_TARGET_TRIPLET: "x64-linux-dynamic"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lld ninja-build curl pkg-config jq cmake build-essential \
            zip unzip tar linux-libc-dev python3-dev autoconf autoconf-archive \
            automake libtool coreutils mono-complete

      - name: Setup vcpkg
        run: make setup

      - name: Validate
        run: make validate

      - name: Configure NuGet source + credentials (GitHub Packages)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NUGET_FEED_URL:-}" ] || [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NuGet secrets not configured. Skipping NuGet publishing."
            exit 0
          fi

          # Ensure vcpkg has downloaded nuget.exe; if not, it will appear after first use.
          # But your logs show vcpkg downloads nuget v7.3.0, so this should exist by now.
          NUGET_EXE="$(ls -1 ./vcpkg/downloads/tools/nuget-*-linux/nuget.exe | head -n 1)"
          echo "Using nuget.exe at: $NUGET_EXE"

          mkdir -p "$HOME/.nuget/NuGet"
          CONFIG="$HOME/.nuget/NuGet/NuGet.Config"

          cat > "$CONFIG" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
            </packageSources>
          </configuration>
          EOF

          mono "$NUGET_EXE" sources Add \
            -Name github \
            -Source "$NUGET_FEED_URL" \
            -UserName "$NUGET_USERNAME" \
            -Password "$NUGET_API_KEY" \
            -StorePasswordInClearText \
            -ConfigFile "$CONFIG" \
            -NonInteractive

          mono "$NUGET_EXE" sources List -ConfigFile "$CONFIG" -NonInteractive
        env:
          NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          NUGET_USERNAME: ${{ secrets.NUGET_USERNAME || github.actor }}

      - name: Build and publish to NuGet (vcpkg binary cache)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.NUGET_FEED_URL }}" ] || [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "NuGet secrets not configured. Skipping NuGet publishing."
            exit 0
          fi

          export NUGET_CONFIG="$HOME/.nuget/NuGet/NuGet.Config"
          export VCPKG_BINARY_SOURCES="clear;nuget,${{ secrets.NUGET_FEED_URL }},readwrite"
          export VCPKG_NUGET_API_TOKEN="${{ secrets.NUGET_API_KEY }}"

          rm -rf vcpkg_installed
          ./vcpkg/vcpkg install \
            --triplet=${{ env.VCPKG_TARGET_TRIPLET }} \
            --overlay-ports=./ports
        env:
          CC: clang
          CXX: clang++

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-installed-${{ env.VCPKG_TARGET_TRIPLET }}
          path: vcpkg_installed/
          retention-days: 30
