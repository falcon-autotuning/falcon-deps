name: Build Dependencies and Publish NuGet Packages

on:
  push:
    branches: [main]
    paths:
      - "vcpkg.json"
      - "ports/**"
      # Make sure this matches your actual workflow filename:
      - ".github/workflows/build_and_publish.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VCPKG_TARGET_TRIPLET: "x64-linux-dynamic"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lld ninja-build curl pkg-config jq cmake build-essential \
            zip unzip tar linux-libc-dev python3-dev autoconf autoconf-archive \
            automake libtool coreutils mono-complete

      - name: Setup vcpkg
        run: make setup

      - name: Validate
        run: make validate

      - name: Remove invalid repo-root NuGet.Config (if present)
        shell: bash
        run: |
          set -euo pipefail
          rm -f ./NuGet.Config || true

      - name: Write NuGet.Config for GitHub Packages
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NUGET_FEED_URL:-}" ] || [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NuGet secrets not configured. Skipping NuGet publishing."
            exit 0
          fi

          mkdir -p "$HOME/.nuget/NuGet"

          cat > "$HOME/.nuget/NuGet/NuGet.Config" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="github" value="${NUGET_FEED_URL}" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="tjk144" />
                <add key="ClearTextPassword" value="${NUGET_API_KEY}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF

          echo "NuGet.Config written."
        env:
          NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Set NuGet API key for GitHub Packages
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${NUGET_FEED_URL:-}" ] || [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NuGet secrets not configured. Skipping NuGet publishing."
            exit 0
          fi

          # Download nuget.exe (so we can run setApiKey before vcpkg downloads its own)
          mkdir -p "$RUNNER_TEMP/nuget"
          curl -fsSL -o "$RUNNER_TEMP/nuget/nuget.exe" \
            https://dist.nuget.org/win-x86-commandline/v7.3.0/nuget.exe

          # Set API key for both forms NuGet might match in logs
          mono "$RUNNER_TEMP/nuget/nuget.exe" setApiKey "$NUGET_API_KEY" -Source "https://nuget.pkg.github.com/falcon-autotuning" -NonInteractive
          mono "$RUNNER_TEMP/nuget/nuget.exe" setApiKey "$NUGET_API_KEY" -Source "$NUGET_FEED_URL" -NonInteractive
        env:
          NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Build and publish to NuGet (vcpkg binary cache)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.NUGET_FEED_URL }}" ] || [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "NuGet secrets not configured. Skipping NuGet publishing."
            exit 0
          fi

          export NUGET_CONFIG="$HOME/.nuget/NuGet/NuGet.Config"
          export VCPKG_BINARY_SOURCES="clear;nuget,${{ secrets.NUGET_FEED_URL }},readwrite"
          export VCPKG_NUGET_API_TOKEN="${{ secrets.NUGET_API_KEY }}"

          rm -rf vcpkg_installed
          ./vcpkg/vcpkg install \
            --debug \
            --debug-env \
            --triplet=${{ env.VCPKG_TARGET_TRIPLET }} \
            --overlay-ports=./ports
            --nuget-config=$HOME/.nuget/NuGet/NuGet.Config

        env:
          CC: clang
          CXX: clang++

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-installed-${{ env.VCPKG_TARGET_TRIPLET }}
          path: vcpkg_installed/
          retention-days: 30
