name: Build Dependencies and Publish NuGet Packages

on:
  push:
    branches:
      - main
    paths:
      - "vcpkg.json"
      - "ports/**"
      - ".github/workflows/build-and-publish.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  VCPKG_TARGET_TRIPLET: "x64-linux-dynamic"

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get install -y \
            lld \
            ninja-build \
            curl \
            pkg-config \
            jq \
            cmake

      - name: Show clang version
        run: |
          clang --version
          clang++ --version
          which clang

      - name: Setup vcpkg
        run: make setup

      - name: Validate
        run: make validate

      - name: Build dependencies
        run: make build
        env:
          CC: clang
          CXX: clang++

      - name: Build and publish to NuGet
        run: |
          echo "Checking NuGet configuration..."
          if [ -z "${{ secrets.NUGET_FEED_URL }}" ] || [ -z "${{ secrets.NUGET_API_KEY }}" ]; then
            echo "⚠ NuGet secrets not configured. Skipping NuGet publishing."
            echo "To enable: Add NUGET_FEED_URL and NUGET_API_KEY secrets in Settings > Secrets and variables > Actions"
            exit 0
          fi

          echo "✓ NuGet secrets found. Publishing binaries..."
          export VCPKG_BINARY_SOURCES="clear;nuget,${{ secrets.NUGET_FEED_URL }},readwrite"
          export VCPKG_NUGET_API_TOKEN="${{ secrets.NUGET_API_KEY }}"

          ./vcpkg/vcpkg install \
            --triplet=${{ env.VCPKG_TARGET_TRIPLET }} \
            --overlay-ports=./ports

          echo "✓ Binaries published to NuGet"
        env:
          CC: clang
          CXX: clang++

      - name: Report build status
        if: success()
        run: |
          echo "## Build Status: ✓ Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triplet**: ${{ env.VCPKG_TARGET_TRIPLET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler**: clang (Ubuntu)" >> $GITHUB_STEP_SUMMARY
          if [ -z "${{ secrets.NUGET_FEED_URL }}" ]; then
            echo "**NuGet**: ⚠ Not configured" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### To enable NuGet publishing:" >> $GITHUB_STEP_SUMMARY
            echo "1. Go to Settings > Secrets and variables > Actions" >> $GITHUB_STEP_SUMMARY
            echo "2. Add \`NUGET_FEED_URL\` secret" >> $GITHUB_STEP_SUMMARY
            echo "3. Add \`NUGET_API_KEY\` secret" >> $GITHUB_STEP_SUMMARY
          else
            echo "**NuGet**: ✓ Configured and publishing" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vcpkg-installed-${{ env.VCPKG_TARGET_TRIPLET }}
          path: vcpkg_installed/
          retention-days: 30
