name: Build Dependencies and Publish NuGet Packages

on:
  push:
    branches:
      - main
    paths:
      - "vcpkg.json"
      - "ports/**"
      - ".github/workflows/build-and-publish.yml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  VCPKG_TARGET_TRIPLET: "x64-linux-dynamic"

jobs:
  build:
    # Ubuntu 26.04 container with latest clang
    runs-on: ubuntu-26.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            bison \
            flex \
            clang \
            pkg-config \
            git \
            curl \
            zip \
            unzip \
            tar \
            linux-libc-dev \
            python3-dev \
            autoconf \
            autoconf-archive \
            automake \
            libtool \
            ninja-build \
            lld \
            coreutils

      - name: Verify clang version
        run: |
          clang --version
          clang++ --version
          echo "✓ Using system clang"

      - name: Validate configurations
        run: |
          jq . vcpkg.json
          echo "✓ vcpkg.json is valid"

      - name: Setup vcpkg (full clone)
        run: |
          if [ ! -d "vcpkg" ]; then
            echo "Cloning vcpkg repository..."
            git clone https://github.com/microsoft/vcpkg.git
          else
            echo "Updating vcpkg..."
            cd vcpkg && git fetch --unshallow && cd ..
          fi
          cd vcpkg && ./bootstrap-vcpkg.sh && cd ..
          echo "✓ vcpkg initialized"

      - name: Build and publish (with NuGet)
        if: secrets.NUGET_FEED_URL != ''
        run: |
          make upload-binaries \
            NUGET_FEED="${{ secrets.NUGET_FEED_URL }}" \
            API_KEY="${{ secrets.NUGET_API_KEY }}"
        env:
          CC: clang
          CXX: clang++

      - name: Build (without NuGet)
        if: secrets.NUGET_FEED_URL == ''
        run: |
          make build
        env:
          CC: clang
          CXX: clang++

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ env.VCPKG_TARGET_TRIPLET }}
          path: vcpkg_installed/
          retention-days: 30

      - name: Build summary
        if: success()
        run: |
          echo "## ✓ Build Success" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triplet**: ${{ env.VCPKG_TARGET_TRIPLET }}" >> $GITHUB_STEP_SUMMARY
          echo "**Compiler**: clang (Ubuntu 26.04)" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: Ubuntu 26.04" >> $GITHUB_STEP_SUMMARY
          if [ "${{ secrets.NUGET_FEED_URL }}" != "" ]; then
            echo "**NuGet Feed**: Configured and published" >> $GITHUB_STEP_SUMMARY
          fi
